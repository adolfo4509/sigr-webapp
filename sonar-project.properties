# SonarQube project configuration
sonar.projectKey=restaurante-nextjs
sonar.projectName=restaurante-nextjs
sonar.projectVersion=0.1.0

# Source directories for a Next.js + React + TypeScript app
sonar.sources=app,src
sonar.tests=src

# Exclude generated files and non-source files
sonar.exclusions=**/node_modules/**,**/.next/**,**/out/**,**/public/**,**/coverage/**,**/*.d.ts,**/*.config.*

# Test file patterns
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,**/*.test.js,**/*.spec.js

# Code coverage report from Jest
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Encoding and quality settings
sonar.sourceEncoding=UTF-8

# Default SonarQube server settings (override with CI environment variables when needed)
sonar.host.url=http://localhost:9000
# Use a SonarQube token for local execution:
 set SONAR_TOKEN=squ_d26c52821b231dc344739ce849be6b8819bc66f7
#   npm run sonar
# sonar.token is passed via the npm script.
